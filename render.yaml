services:
  - type: web
    name: yutaka-inventory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Neon の接続文字列を Render の管理画面で設定
      - key: SECRET_KEY
        generateValue: true
