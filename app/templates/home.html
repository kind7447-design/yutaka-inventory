{% extends "base.html" %}
{% block title %}メニュー{% endblock %}
{% block content %}
<h2>メニュー</h2>

  <h3 style="margin-top:0; color:#c2691c;">調達品（自社手配）</h3>
  <div class="row">
    <a class="btn" href="/items?kind=chotatsu">品目マスタ</a>

<div class="card">

    <a class="btn" href="/inbound">入荷予定・受入消込</a>
