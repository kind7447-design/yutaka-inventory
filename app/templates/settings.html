{% extends "base.html" %}
{% block title %}設定{% endblock %}
{% block content %}
<h2>設定（注文依頼書の自社情報など）</h2>
{% if saved %}<div class="card" style="background:#e8f5e9; color:#1b5e20;">保存しました</div>{% endif %}
<div class="card" style="margin-top:12px;">
  <form method="post" action="/settings">
    {% for key, label in labels.items() %}
    <label>{{ label }}</label>
    <input name="{{ key }}" value="{{ values[key] }}">
    {% endfor %}
    <div style="margin-top:16px;">
      <button class="btn" type="submit">保存</button>
      <a class="btn gray" href="/">メニューへ</a>
    </div>
  </form>
</div>
{% endblock %}
