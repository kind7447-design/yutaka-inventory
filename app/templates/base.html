<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}在庫管理{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
           margin: 0; background: #f4f6f8; color: #222; }
    header { background: #1f5f8b; color: #fff; padding: 10px 16px; display: flex;
             justify-content: space-between; align-items: center; }
    header a { color: #fff; text-decoration: none; }
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }
    .btn { display: inline-block; padding: 8px 14px; border-radius: 6px; border: none;
           background: #1f5f8b; color: #fff; cursor: pointer; text-decoration: none; font-size: 14px; }
    .btn.gray { background: #6c757d; }
    .btn.sm { padding: 4px 10px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eef3f7; }
    input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc;
           border-radius: 4px; font-size: 14px; }
    label { display: block; margin: 10px 0 4px; font-weight: bold; font-size: 13px; }
    .card { background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 140px; }
    .error { background: #fdecea; color: #b71c1c; padding: 10px; border-radius: 6px; margin-bottom: 12px; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; color: #fff; }
    .badge.shikyu { background: #2e7d32; }
    .badge.chotatsu { background: #c2691c; }
    .menu-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .menu-grid a { flex: 1; min-width: 200px; text-align: center; padding: 28px; font-size: 16px; }
  </style>
</head>
<body>
  {% if user is defined and user %}
  <header>
    <div><a href="/"><strong>在庫管理</strong></a></div>
    <div>{{ user.name }} さん ｜ <a href="/password">パスワード変更</a> ｜ <a href="/logout">ログアウト</a></div>
  </header>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
