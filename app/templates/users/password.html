{% extends "base.html" %}
{% block title %}パスワード変更{% endblock %}
{% block content %}
<h2>パスワード変更</h2>
{% if saved %}<div class="card" style="background:#e8f5e9; color:#1b5e20;">パスワードを変更しました</div>{% endif %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<div class="card" style="max-width:420px; margin-top:12px;">
  <form method="post" action="/password">
    <label>現在のパスワード</label>
    <input name="current_password" type="password" required>
    <label>新しいパスワード（4文字以上）</label>
    <input name="new_password" type="password" required>
    <label>新しいパスワード（確認）</label>
    <input name="confirm_password" type="password" required>
    <div style="margin-top:16px;">
      <button class="btn" type="submit">変更する</button>
      <a class="btn gray" href="/">メニューへ</a>
    </div>
  </form>
</div>
{% endblock %}
